<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO-QUEST | Реєстрація Дослідника</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #fbbf24;
            --bg: #f0f9ff;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-container { width: 100%; max-width: 400px; background: var(--white); border-radius: 30px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); box-sizing: border-box; }

        /* Прогрес-бар */
        .progress-line { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #bar { height: 100%; background: var(--primary); width: 20%; transition: width 0.4s ease; }

        .step { display: none; animation: slideIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h2 { font-size: 1.3rem; color: #1e293b; text-align: center; margin-bottom: 20px; }
        
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 15px; font-size: 1rem; box-sizing: border-box; text-align: center; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn-opt { display: block; width: 100%; padding: 14px; margin-bottom: 10px; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 15px; cursor: pointer; text-align: left; font-size: 0.95rem; transition: all 0.2s; }
        .btn-opt:hover { background: #eff6ff; border-color: var(--primary); }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        /* Візуал аватара */
        #avatar-preview { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; border: 3px solid var(--accent); transition: background 0.3s; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-line"><div id="bar"></div></div>

    <!-- Крок 1: Ім'я -->
    <div class="step active" id="step1">
        <h2>🛰️ ЦЕНТР ЗВ'ЯЗКУ</h2>
        <div id="avatar-preview" style="background: #e2e8f0;"></div>
        <input type="text" id="u-name" placeholder="Твоє ім'я дослідника">
        <button class="btn-main" onclick="nextStep(2)">ПІДКЛЮЧИТИСЯ</button>
    </div>

    <!-- Крок 2: Шкіра (Антропологія) -->
    <div class="step" id="step2">
        <h2>🎨 ГЕО-ПОРТРЕТ: Шкіра</h2>
        <button class="btn-opt" onclick="setTrait('skin', 'euro', '#ffe0bd', 3)">⚪ Світла (Європейський тип)</button>
        <button class="btn-opt" onclick="setTrait('skin', 'negro', '#8d5524', 3)">🟤 Темна (Екваторіальний тип)</button>
        <button class="btn-opt" onclick="setTrait('skin', 'mongo', '#ffdbac', 3)">🟡 Смаглява (Азійський тип)</button>
    </div>

    <!-- Крок 3: Очі -->
    <div class="step" id="step3">
        <h2>👁️ ГЕО-ПОРТРЕТ: Очі</h2>
        <button class="btn-opt" onclick="setTrait('eyes', 'wide', '', 4)">🌍 Широкі (Помірні широти)</button>
        <button class="btn-opt" onclick="setTrait('eyes', 'narrow', '', 4)">🛡️ З епікантусом (Степи/Пустелі)</button>
    </div>

    <!-- Крок 4: Фіналізація -->
    <div class="step" id="step4">
        <h2>🎉 ПАРАМЕТРИ ПРИЙНЯТО!</h2>
        <div id="summary-info" style="font-size: 0.9rem; line-height: 1.5; color: #64748b; margin-bottom: 20px;"></div>
        <button class="btn-main" onclick="createAccount()">УВІЙТИ В ХАБ 🌍</button>
    </div>
</div>

<script>
    let userData = {
        name: "",
        skinType: "",
        skinColor: "",
        eyeType: "",
        progress: { intro: "done" },
        points: 10
    };

    function nextStep(s) {
        if(s === 2 && !document.getElementById('u-name').value) {
            alert("Введи ім'я!"); return;
        }
        userData.name = document.getElementById('u-name').value;
        
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        document.getElementById('bar').style.width = (s * 25) + "%";
    }

    function setTrait(trait, value, color, next) {
        if(trait === 'skin') {
            userData.skinType = value;
            userData.skinColor = color;
            document.getElementById('avatar-preview').style.background = color;
        }
        if(trait === 'eyes') userData.eyeType = value;
        
        if(next === 4) {
            document.getElementById('summary-info').innerHTML = `
                <b>Дослідник:</b> ${userData.name}<br>
                <b>Твій Біо-код:</b> Адаптація до клімату активована. <br>
                Твій персональний кабінет готовий до роботи.
            `;
        }
        nextStep(next);
    }

    function createAccount() {
        // 1. Зберігаємо локально
        localStorage.setItem('geo_user', JSON.stringify(userData));
        
        // 2. Відправляємо вчителю (ваша Google таблиця)
        sendToTeacher(userData);

        // 3. Переходимо до мапи (файл hub.html)
        alert("Реєстрація успішна! Ласкаво просимо на борт.");
        window.location.href = "hub.html"; 
    }

    async function sendToTeacher(data) {
        const SCRIPT_URL = "ВАШ_URL_СКРИПТА";
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data)
        });
    }
</script>
</body>
</html>
